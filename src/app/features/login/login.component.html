<form
  appForm
  (formValue)="formValue.set($event)"
  class="grid grid-cols-1 gap-4"
  #form="ngForm"
  (ngSubmit)="onLoginUser(form)"
>
  <div class="flex flex-col gap-1">
    <label for="email" class="text-sm font-medium text-gray-700">Email</label>
    <input
      name="email"
      id="email"
      [ngModel]="formValue()?.email"
      type="text"
      required
      class="w-xs rounded-sm border border-gray-300 px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
  </div>
  @if(formValue()?.email === undefined || formValue()?.email === '') {
  <p class="text-red-400">Please fill in the email</p>
  }

  <div class="flex flex-col gap-1">
    <label for="password" class="text-sm font-medium text-gray-700">Password</label>
    <input
      id="password"
      name="password"
      [ngModel]="formValue()?.password"
      type="password"
      required
      class="w-xs rounded-sm border border-gray-300 px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
  </div>
  @if(formValue()?.password === undefined || formValue()?.password === '') {
  <p class="text-red-400">Please fill in the password</p>
  }
  <app-button
    buttonType="success"
    buttonId="login"
    [isDisabled]="form.invalid!"
    [isLoading]="isLoading()"
    label="Submit"
    type="submit"
  ></app-button>
</form>
