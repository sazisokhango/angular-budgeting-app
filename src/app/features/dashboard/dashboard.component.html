<nav
  class="fixed top-0 left-0 z-50 flex items-center justify-between w-full h-[73px] px-4 bg-[#e0e0e0]"
>
  <div class="flex items-center gap-3">
    <button class="md:hidden" (click)="isSidebarOpen = !isSidebarOpen">☰</button>
    <a routerLink="home">
      <img src="budget-buddy.png" class="h-20 w-auto" />
    </a>
  </div>
  <div class="">
    @if (authStore.isAuthenticated()) {
      <div class="relative inline-block text-left">
        <button
          type="button"
          class="flex items-center rounded-full border border-gray-300 p-1 focus:outline-none focus:ring-2 focus:ring-blue-500"
          (click)="isDropdownOpen.set(!isDropdownOpen())"
        >
          <img [src]="avatarUrl" alt="Avatar" class="w-10 h-10 rounded-full" />
        </button>
      
        @if(isDropdownOpen()) {
          <div
          class="absolute right-0 mt-2 w-36 bg-white shadow-lg rounded-md z-50"
        >
          <button
            class="block w-full text-left px-4 py-2 hover:bg-gray-100"
            (click)="authStore.logout()"
          >
          <fa-icon [icon]="faLogout"></fa-icon>Logout
          </button>
        </div>
        }
      </div>
    } @else{
    <a routerLink="login" class="hover:underline">Login</a>
    <a routerLink="register" class="px-3 hover:underline">Register</a>
    }
  </div>
</nav>

<div class="flex h-[calc(100vh-50px)] mt-[72px]">
  <aside
    class="fixed md:static top-[50px] left-0 w-[200px] h-full bg-[#f2f2f2] p-5 transform transition-transform duration-200 -translate-x-full md:translate-x-0"
    [class.translate-x-0]="isSidebarOpen"
  >
    <ul class="m-0">
      <li class="pb-6"><a routerLink="home" (click)="isSidebarOpen = false">Home</a></li>
      <li><a routerLink="transactions" (click)="isSidebarOpen = false">Transactions</a></li>
    </ul>
  </aside>

  <main class="flex-1 p-5 bg-white box-border overflow-y-auto">
    <router-outlet></router-outlet>
  </main>
  <app-footer></app-footer>
  <app-toast></app-toast>
</div>
